name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # və ya sənin əsas branch-inin adı nədirsə (məs. master)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
       run: |
          git push --force https://nihat2001:$HF_TOKEN@huggingface.co/spaces/nihat2001/SmartAgro-Supply-Chain-AI main
